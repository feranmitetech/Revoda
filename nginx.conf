# /etc/nginx/sites-available/revoda
# Nginx config for Revoda production deployment
# Serves: dashboard (React), mobile PWA, admin panel, API proxy

server {
    listen 80;
    server_name revoda.eienigeria.org www.revoda.eienigeria.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name revoda.eienigeria.org www.revoda.eienigeria.org;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/revoda.eienigeria.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revoda.eienigeria.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss:;" always;

    # ── React Dashboard (main app) ────────────────────────────────
    location / {
        root /var/www/revoda/dashboard/dist;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA routing

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Mobile PWA Report Form ────────────────────────────────────
    location /report {
        root /var/www/revoda;
        try_files /mobile/report.html =404;

        # Service worker scope
        add_header Service-Worker-Allowed "/report";
    }

    # ── Admin Panel (IP-restricted) ───────────────────────────────
    location /admin {
        # RESTRICT to EiE Nigeria office IPs and VPN
        allow 41.58.0.0/16;     # EiE Nigeria office range
        allow 10.0.0.0/8;       # VPN
        deny all;

        root /var/www/revoda;
        try_files /admin/index.html =404;
    }

    # ── FastAPI Backend ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Rate limiting — protect on election day
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        # Timeout (long for bulk uploads)
        proxy_read_timeout 60s;
    }

    # ── WebSocket (live feed) ─────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;  # Keep WS alive for 1hr
    }

    # ── SMS/USSD Webhook (Africa's Talking) ──────────────────────
    location /sms/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Only accept from Africa's Talking IP ranges
        allow 196.201.214.0/24;
        allow 196.201.215.0/24;
        deny all;
    }

    # ── Docs (API Swagger — dev only, disable in production) ─────
    location /docs {
        deny all;  # Disable in production
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Max upload size (for media evidence)
    client_max_body_size 25M;
}

# Rate limit zones (define in nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
