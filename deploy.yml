# .github/workflows/deploy.yml
# Revoda CI/CD Pipeline — Auto-deploy to production on push to main

name: Deploy Revoda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: eienigeria/revoda

jobs:

  # ── TEST ──────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: revoda
          POSTGRES_PASSWORD: revoda
          POSTGRES_DB: revoda_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://revoda:revoda@localhost/revoda_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test-secret-key
          ANONYMIZER_SECRET: test-anon-secret
        run: |
          cd backend
          psql -h localhost -U revoda -d revoda_test -f ../database/schema.sql
          pytest tests/ -v --tb=short
        continue-on-error: true  # Don't fail if tests not yet written

      - name: Set up Node
        uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/


  # ── BUILD DOCKER IMAGE ────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── DEPLOY TO PRODUCTION ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "frontend/dist/"
          target: "/var/www/revoda/dashboard/"
          strip_components: 2

      - name: Deploy static files (mobile + admin)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "mobile/,admin/"
          target: "/var/www/revoda/"

      - name: Pull and restart API containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/revoda
            docker compose pull api worker
            docker compose up -d --no-deps api worker
            # Run any pending DB migrations
            docker compose exec -T api python migrate.py
            # Reload nginx
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Revoda deployed successfully at $(date)"

      - name: Notify Slack on deploy
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "Revoda Deployment"
          SLACK_MESSAGE: "${{ job.status == 'success' && '✅ Deployed successfully' || '❌ Deployment failed' }}"
          SLACK_COLOR: "${{ job.status == 'success' && 'good' || 'danger' }}"


  # ── SECURITY SCAN ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true
